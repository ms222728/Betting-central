<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDGEHUB • Real-Time Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        .command-bg { background: #020617; }
        .neon-green { color: #22c55e; text-shadow: 0 0 10px rgba(34,197,94,0.4); }
        .game-card { transition: all 0.25s cubic-bezier(0.4,0,0.2,1); }
        .game-card:active { transform: scale(0.97); }
        .nav-tab.active { color: #22c55e; border-bottom: 3px solid #22c55e; }
    </style>
</head>
<body class="command-bg text-slate-200 min-h-screen">
    <!-- Header and UI same as before -->
    <div class="sticky top-0 bg-slate-950 border-b border-slate-800 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-chart-line text-white text-3xl"></i>
                </div>
                <div class="font-display text-3xl font-semibold tracking-tighter neon-green">EDGEHUB</div>
            </div>
            <div class="flex items-center gap-x-6">
                <div>Michael • iPad</div>
                <div onclick="editBankroll()" class="cursor-pointer bg-slate-900 px-5 py-2 rounded-3xl flex items-center gap-x-3 border border-slate-700">
                    <div id="bankroll-display" class="font-mono text-2xl font-semibold">$28,750</div>
                    <i class="fa-solid fa-wallet text-emerald-400"></i>
                </div>
                <button onclick="refreshAllData()" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-sync"></i> REFRESH
                </button>
            </div>
        </div>
    </div>

    <!-- Sport Filter, Quick Stats, Tabs - same as previous versions -->

    <div id="main-content" class="max-w-screen-2xl mx-auto px-6 pt-6">
        <!-- Populated by JS -->
    </div>

    <script>
        // WebSocket Integration
        let ws;
        function connectWebSocket() {
            ws = new WebSocket('wss://echo.websocket.org'); // Replace with real sports WS (e.g. from Odds API or your backend)
            ws.onopen = () => console.log('WebSocket connected - Real-time updates active');
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('Live update received:', data);
                // Update games, scores, odds in real-time
                updateLiveDataFromWS(data);
            };
            ws.onclose = () => setTimeout(connectWebSocket, 5000);
        }

        function updateLiveDataFromWS(data) {
            // Example: Update a game score
            if (data.gameId) {
                const game = games.find(g => g.id === data.gameId);
                if (game) {
                    game.awayScore = data.awayScore || game.awayScore;
                    game.homeScore = data.homeScore || game.homeScore;
                    refreshCurrentView();
                }
            }
        }

        // Rest of your full code (games data, render functions, etc.)
        let bankroll = 28750;
        let currentSportFilter = 'all';

        let games = [ /* your full games array */ ];

        window.onload = function() {
            initTailwind();
            connectWebSocket(); // Start real-time WebSocket
            console.log('%cEDGEHUB - Real-Time WebSocket Enabled', 'color:#22c55e;font-size:16px');
        };
    </script>
</body>
</html>
